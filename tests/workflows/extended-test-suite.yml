name: Extended Test Suite

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  p0-gate:
    runs-on: ubuntu-latest
    env:
      MOCK_LLM: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r requirements-test.txt
      - name: Run P0 tests
        run: pytest tests/ -m "p0" --mock-llm -x -q

  full-suite:
    runs-on: ubuntu-latest
    needs: p0-gate
    env:
      MOCK_LLM: 1
      AUDIT_LOG: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r requirements-test.txt
      - name: Run full suite with coverage
        run: |
          pytest tests/ --mock-llm --cov=auron --cov-report=term-missing -q

  nightly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      MOCK_LLM: 1
      AUDIT_LOG: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r requirements-test.txt
      - name: Run nightly with HTML report
        run: |
          pytest tests/ --mock-llm --cov=auron --cov-report=html:reports/htmlcov \
            --cov-fail-under=80 --junitxml=reports/nightly.xml -q
