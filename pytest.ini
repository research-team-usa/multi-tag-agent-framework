[pytest]
# ---------------------------------------------------------------------------
# Multi-Tag Agent – pytest configuration
# ---------------------------------------------------------------------------

# ── Test discovery ──────────────────────────────────────────────────────────
testpaths =
    tests/unit
    tests/integration
    tests/security

python_files   = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ── Markers ─────────────────────────────────────────────────────────────────
markers =
    p0: Critical smoke / gate tests — must pass before any merge
    p1: Standard integration and functional tests
    p2: Extended / nightly tests (coverage, security, load)

# ── Default addopts ─────────────────────────────────────────────────────────
addopts =
    --strict-markers
    --tb=short
    -q
    --color=yes

# ── Coverage (pytest-cov) ───────────────────────────────────────────────────
[coverage:run]
branch = true
source = src
omit =
    src/**/__init__.py
    src/**/migrations/**
    tests/**

[coverage:report]
fail_under = 80
show_missing = true
skip_covered = false
exclude_lines =
    pragma: no cover
    if TYPE_CHECKING:
    raise NotImplementedError
    \.\.\.

[coverage:html]
directory = reports/htmlcov

[coverage:xml]
output = reports/coverage.xml

# ── Logging ─────────────────────────────────────────────────────────────────
log_cli       = true
log_cli_level = WARNING
log_file      = reports/logs/pytest.log
log_file_level = DEBUG
log_format    = %(asctime)s %(levelname)-8s %(name)s  %(message)s
log_date_format = %Y-%m-%dT%H:%M:%S

# ── Misc ────────────────────────────────────────────────────────────────────
filterwarnings =
    error
    ignore::DeprecationWarning:pkg_resources
    ignore::PendingDeprecationWarning
