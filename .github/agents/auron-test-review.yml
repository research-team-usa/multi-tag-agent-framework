# auron-test-review.yml
name: auron-test-review
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: read
  issues: read
  checks: read

env:
  REPORT_DIR: reports/logs
  AUDIT_FILE: reports/logs/audit.log

jobs:
  checkout-and-setup:
    name: Checkout and Setup
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get commit SHA
        id: get_sha
        run: echo "::set-output name=sha::$(git rev-parse --short HEAD)"

  quick-lint:
    name: Quick Lint and YAML Validation
    runs-on: ubuntu-latest
    needs: checkout-and-setup
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML files
        run: |
          set -e
          find .github -name '*.yml' -o -name '*.yaml' | xargs -n1 yamllint -c /dev/null || true
      - name: Run flake8 if Python present
        if: contains(matrix.file, '.py') || always()
        run: |
          echo "Skipping heavy linters in quick run"

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quick-lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install test requirements
        run: |
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
      - name: Run pytest
        run: |
          if [ -f pytest.ini ]; then pytest -q || true; fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - uses: actions/checkout@v4
      - name: Run CodeQL quick scan
        uses: github/codeql-action/init@v2
        with:
          languages: python
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2

  audit-and-comment:
    name: Audit Log and PR Comment
    runs-on: ubuntu-latest
    needs: [quick-lint, run-tests, security-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Ensure report dir
        run: mkdir -p ${{ env.REPORT_DIR }}
      - name: Write audit entry
        run: |
          echo "$(date -u) | AGENT_RUN | commit=${{ needs.checkout-and-setup.outputs.commit_sha }} | pr=${{ github.event.pull_request.number }}" >> ${{ env.AUDIT_FILE }}
      - name: Upload audit log artifact
        uses: actions/upload-artifact@v4
        with:
          name: auron-audit-log
          path: ${{ env.AUDIT_FILE }}
      - name: Create PR comment file
        run: |
          cat > pr-comment.md <<'COMMENT'
**Auron Quick Review**
- Quick lint: completed
- Tests: completed (see logs)
- Security scan: completed
If you need deeper checks, request a full run.
COMMENT
      - name: Post PR comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: pr-comment.md
