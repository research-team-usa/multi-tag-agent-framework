name: auron-test-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: read

env:
  REPORT_DIR: reports/logs
  AUDIT_FILE: reports/logs/audit.log

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkout-and-setup:
    name: Checkout and Setup
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get commit SHA
        id: get_sha
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  quick-lint:
    name: Quick Lint and YAML Validation
    runs-on: ubuntu-latest
    needs: checkout-and-setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          set -e
          if command -v yamllint >/dev/null 2>&1; then
            find . -name '*.yml' -o -name '*.yaml' | xargs -r -n1 yamllint -c /dev/null || true
          else
            echo "yamllint not installed; skipping YAML lint"
          fi

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quick-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test requirements
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "no requirements.txt"; fi

      - name: Run pytest
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then
            pytest -q || true
          else
            echo "no tests found; skipping"
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  audit-and-comment:
    name: Audit Log and PR Comment
    runs-on: ubuntu-latest
    needs: [quick-lint, run-tests, security-scan, checkout-and-setup]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure report dir
        run: mkdir -p "${{ env.REPORT_DIR }}"

      - name: Ensure audit file exists
        run: |
          if [ ! -f "${{ env.AUDIT_FILE }}" ]; then
            mkdir -p "$(dirname "${{ env.AUDIT_FILE }}")"
            echo "# Audit Log for Auron Agent" > "${{ env.AUDIT_FILE }}"
          fi

      - name: Write audit entry
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) | AGENT_RUN | commit=${{ needs.checkout-and-setup.outputs.commit_sha }} | pr=${{ github.event.pull_request.number }}" >> "${{ env.AUDIT_FILE }}"

      - name: Upload audit log artifact
        uses: actions/upload-artifact@v4
        with:
          name: auron-audit-log
          path: ${{ env.AUDIT_FILE }}

      - name: Create PR comment file
        run: |
          cat > pr-comment.md <<'COMMENT'
**Auron Quick Review**
- Quick lint: completed
- Tests: completed (see logs)
- Security scan: completed
If you need deeper checks, request a full run.
COMMENT

      - name: Post PR comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: pr-comment.md
