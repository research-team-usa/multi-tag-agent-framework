name: Python Unit Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/unit-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Verhindert den Abbruch von 3.12, falls 3.11 fehlschlägt
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # HARTE INSTALLATION DER KERN-WERKZEUGE (Der Prüfstand wird autark)
          pip install pytest pytest-asyncio pytest-timeout pytest-cov pytest-mock httpx respx pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          # Detaillierte Fehler-Ausgabe (--tb=short) erzwingen
          pytest tests/ -m "p0" -v --tb=short
