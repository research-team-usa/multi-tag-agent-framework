name: Code Quality

on:
  pus h:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug: show workspace and files
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "pwd: $(pwd)"
          echo "ls root:"
          ls -la
          echo "find requirements files (depth 4):"
          find . -maxdepth 4 -type f -name "requirements*.txt" -print || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Locate project root (where requirements live) and install deps
        shell: bash
        run: |
          # Find first requirements file (search depth 4)
          REQ_FILE=$(find . -maxdepth 4 -type f -name "requirements*.txt" | head -n1 || true)
          if [ -n "$REQ_FILE" ]; then
            REQ_DIR=$(dirname "$REQ_FILE")
            echo "Found requirements at: $REQ_FILE"
            echo "Switching to directory: $REQ_DIR"
            cd "$REQ_DIR"
          else
            echo "No requirements file found in repo (search depth 4). Using repo root."
          fi

          python -m pip install --upgrade pip
          pip install pylint black isort mypy bandit || true

          if [ -n "$REQ_FILE" ]; then
            pip install -r "$(basename "$REQ_FILE")" || true
          else
            echo "No extra requirements to install."
          fi

          # Export the working dir for later steps
          echo "PROJECT_WORKDIR=$(pwd)" >> $GITHUB_ENV

      - name: Run Black formatter check
        shell: bash
        run: |
          cd "$PROJECT_WORKDIR"
          black --check .

      - name: Run isort import checker
        shell: bash
        run: |
          cd "$PROJECT_WORKDIR"
          isort --check-only --diff .

      - name: Run pylint
        shell: bash
        run: |
          cd "$PROJECT_WORKDIR"
          # adjust paths if your tests or package live elsewhere
          pylint tests/ --max-line-length=100

      - name: Run mypy type checker
        shell: bash
        run: |
          cd "$PROJECT_WORKDIR"
          mypy tests/ --ignore-missing-imports

      - name: Run bandit security check
        shell: bash
        run: |
          cd "$PROJECT_WORKDIR"
          bandit -r tests/ -ll
