name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint black isort mypy bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Black formatter check
        run: black --check --diff . || true

      - name: Run isort import checker
        run: isort --check-only --diff . || true

      - name: Run pylint
        run: pylint tests/ --exit-zero --max-line-length=100 || true

      - name: Run mypy type checker
        run: mypy tests/ --ignore-missing-imports || true

      - name: Run bandit security check
        run: bandit -r tests/ -ll || true
