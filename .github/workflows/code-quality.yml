name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Find project root and requirements
        id: find
        run: |
          echo "Searching for requirements files..."
          ROOT=$(pwd)
          REQ=$(find . -maxdepth 4 -type f -name "requirements*.txt" | head -n 1 || true)
          if [ -n "$REQ" ]; then
            DIR=$(dirname "$REQ")
            echo "found_req=$REQ" >> $GITHUB_OUTPUT
            echo "project_dir=$DIR" >> $GITHUB_OUTPUT
          else
            echo "found_req=" >> $GITHUB_OUTPUT
            echo "project_dir=" >> $GITHUB_OUTPUT
          fi

      - name: Show debug info
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          echo "find results:"
          find . -maxdepth 4 -type f -name "requirements*.txt" || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -n "${{ steps.find.outputs.found_req }}" ]; then
            pip install -r "${{ steps.find.outputs.found_req }}"
          else
            echo "No requirements file found; installing linters only"
          fi
          pip install black isort pylint mypy bandit

      - name: Run linters
        run: |
          # if project_dir set, run inside it
          if [ -n "${{ steps.find.outputs.project_dir }}" ]; then
            cd "${{ steps.find.outputs.project_dir }}"
          fi
          black --check .
          isort --check-only .
          pylint $(git ls-files '*.py' || true) || true
          mypy --ignore-missing-imports .
          bandit -r . || true
