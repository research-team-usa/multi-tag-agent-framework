name: Bug Report
description: Report a problem with the multi-tag-agent-framework
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time! Helps us fix Auron's house faster.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description
      placeholder: "When I run X, I get Y..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: "main @ abc123"
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      render: shell
